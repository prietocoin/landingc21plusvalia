<body class="bg-white text-c21black antialiased min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="fade-in">

        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter leading-none mb-4">

        </div>
    </div>

    <script>
        // Capturar parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const nombre = urlParams.get('nombre') || 'Inversor';
        const objetivo = urlParams.get('objetivo') || 'Plusvalía';
        
        // Configurar el link de WhatsApp dinámico
        const phone = "595994325713";
        const message = `Hola Jairo, soy ${nombre}. Acabo de validar mi perfil en la terminal con objetivo: ${objetivo}. Deseo recibir la ficha técnica de TownCenter y la hoja de ruta de plusvalía.`;
        
        document.getElementById('btnWhatsapp').href = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    </script>
