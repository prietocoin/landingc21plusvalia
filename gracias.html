<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Validado | Century 21 Bonanza</title>
    
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    
    // USAMOS TU NUEVO ID ACTUALIZADO
    fbq('init', '1311042437546028'); 
    
    // Registramos la conversión final: Lead
    fbq('track', 'Lead', {
        content_category: 'Real Estate Inversion',
        content_name: 'Validacion Perfil Alpha'
    }); 
    </script>
    <noscript><img height="1" width="1" style="display:none" 
    src="https://www.facebook.com/tr?id=1311042437546028&ev=Lead&noscript=1"/></noscript>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="mb-6 text-[#c4a47c] animate-bounce">
        <i class="fas fa-check-circle text-7xl md:text-8xl"></i>
    </div>

    <h1 class="text-4xl md:text-5xl font-black uppercase mb-4 tracking-tighter leading-none">¡Perfil Validado!</h1>
    <p class="text-gray-500 text-sm tracking-widest uppercase mb-10 max-w-sm mx-auto">Tus datos han sido registrados. Haz clic abajo para recibir tu diagnóstico en WhatsApp.</p>
    
    <a id="btnWhatsapp" href="#" class="bg-black text-[#c4a47c] px-10 py-5 text-xs font-bold tracking-[0.3em] uppercase hover:bg-[#c4a47c] hover:text-white transition-all shadow-2xl flex items-center gap-4 rounded-sm scale-110 active:scale-95">
        <i class="fab fa-whatsapp text-xl"></i>
        Abrir WhatsApp Ahora
    </a>

    <div class="mt-20 flex flex-col items-center opacity-40">
        <span class="text-lg font-bold tracking-tighter uppercase leading-none">Century 21</span>
        <span class="text-[9px] font-light tracking-[0.2em] uppercase">Bonanza // Jairo Prieto</span>
    </div>

    <script>
        // RECUPERAMOS LOS DATOS QUE EL INDEX PASÓ POR LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const nombre = urlParams.get('nombre') || 'Inversor';
        const objetivo = urlParams.get('objetivo') || 'Plusvalía';
        const rango = urlParams.get('rango') || 'Inversión';
        const zona = urlParams.get('zona') || 'Asunción';
        const timing = urlParams.get('timing') || 'Hoy';
        
        // CONSTRUIMOS EL MENSAJE CON TU NÚMERO VALIDADO (+595994325713)
        const message = `Hola Jairo, soy ${nombre}. Acabo de validar mi perfil Alpha en la terminal:
- Objetivo: ${objetivo}
- Rango: ${rango}
- Zona: ${zona}
- Timing: ${timing}
Deseo recibir mi hoja de ruta estratégica.`;
        
        // LO PONEMOS EN EL BOTÓN
        document.getElementById('btnWhatsapp').href = `https://wa.me/595994325713?text=${encodeURIComponent(message)}`;
    </script>
</body>
</html>
